version: '3.8'

services:

  database:
    image: mysql:8.0
    container_name: mysql-db

    restart: unless-stopped

    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: studentdb

    ports:
      - "3306:3306"

    volumes:
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql

  backend:
    build: ./backend

    container_name: backend

    restart: unless-stopped

    ports:
      - "5001:5001"

    depends_on:
      - database

  frontend:
    build: ./frontend

    container_name: frontend

    restart: unless-stopped

    ports:
      - "8082:80"

    depends_on:
      - backend