services:

  database:
    build: ./database
    container_name: mysql-db

    restart: unless-stopped

    ports:
      - "3306:3306"

  backend:
    build: ./backend

    container_name: backend

    restart: unless-stopped

    ports:
      - "5001:5001"

    depends_on:
      - database

  frontend:
    build: ./frontend

    container_name: frontend

    restart: unless-stopped

    ports:
      - "8082:80"

    depends_on:
      - backend